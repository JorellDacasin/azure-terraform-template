# ──────────────────────────────────────────────────────────────
# Drift Detection — GitHub Actions
# Scheduled: weekly (Monday 06:00 UTC / 10:00 Dubai).
# Runs `terraform plan -detailed-exitcode` to detect manual
# Azure changes that don't match the code.
# Creates a GitHub Issue if drift is found.
# ──────────────────────────────────────────────────────────────

name: 'Terraform Drift Detection'

on:
  schedule:
    - cron: '0 6 * * 1'           # Every Monday 06:00 UTC (10:00 Dubai)
  workflow_dispatch: {}            # Manual trigger for testing

permissions:
  contents: read
  issues: write                    # Needed to create drift issues

env:
  TF_WORKING_DIR: 'terraform/environments/dev'
  ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}

jobs:
  drift-check:
    name: 'Detect Drift'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.5.7'

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.BACKEND_CONTAINER }}" \
            -backend-config="key=${{ secrets.BACKEND_STATE_KEY }}" \
            -input=false

      # ── Plan with detailed exit code ─────────────────────
      - name: Terraform Plan (Drift Check)
        id: drift
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          set +e
          terraform plan -input=false -no-color -detailed-exitcode \
            2>&1 | tee drift-output.txt
          EXIT_CODE=$?
          set -e

          echo "exitcode=$EXIT_CODE" >> "$GITHUB_OUTPUT"

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ No drift — Azure state matches code."
          elif [ $EXIT_CODE -eq 2 ]; then
            echo "⚠️ DRIFT DETECTED — Azure state differs from code."
          else
            echo "❌ Terraform plan failed."
            exit 1
          fi

      # ── Create GitHub Issue on drift ─────────────────────
      # Only runs when exit code = 2 (drift detected).
      # Creates a new issue so the team is notified and can
      # investigate which resource was changed manually.
      - name: Create Drift Issue
        if: steps.drift.outputs.exitcode == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const driftPath = '${{ env.TF_WORKING_DIR }}/drift-output.txt';
            let plan = 'No plan output found.';
            if (fs.existsSync(driftPath)) {
              plan = fs.readFileSync(driftPath, 'utf8');
              if (plan.length > 60000) {
                plan = plan.substring(0, 60000) + '\n\n... (truncated)';
              }
            }

            const today = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Terraform Drift Detected — ${today}`,
              body: `## Drift Detection Report\n\nThe weekly drift check found differences between the Terraform code and the actual Azure state.\n\nSomeone may have made manual changes in the Azure portal.\n\n### Plan Output\n\n\`\`\`\n${plan}\n\`\`\`\n\n### Next Steps\n\n1. Review the plan output above\n2. If the change is intentional, update the Terraform code to match\n3. If unintentional, run \`terraform apply\` to restore the desired state`,
              labels: ['infrastructure', 'drift'],
            });

      # ── Log clean result ─────────────────────────────────
      - name: No Drift
        if: steps.drift.outputs.exitcode == '0'
        run: echo "✅ All clear — no infrastructure drift detected."
